<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Educativo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="grid-container">

    <section class="left-panel">
      <article class="info-overlay">
        <h2>Bienvenido al sistema educativo</h2>
        <p>Gestión institucional, seguimiento académico y más.</p>
        <ul>
          <li>Gestión de estudiantes y profesores</li>
          <li>Calificaciones y reportes</li>
          <li>Control de asistencia</li>
        </ul>
        <section class="stats">
          <article>
            <strong>1,200+</strong>
            <span>Estudiantes</span>
          </article>
          <article>
            <strong>80+</strong>
            <span>Profesores</span>
          </article>
          <article>
            <strong>150+</strong>
            <span>Cursos</span>
          </article>
        </section>
      </article>
    </section>

    <section class="right-panel">
      <article class="login-form">
        <h2>Iniciar sesión</h2>
        <form>
          <input type="text" placeholder="Usuario" required />
          <input type="password" placeholder="Contraseña" required />
          <button type="submit">Entrar</button>
        </form>
      </article>
    </section>

  </main>

</body>
</html>
